services:
  postgres:
    image: postgres:16-alpine
    container_name: pen-and-paper-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: penandpaper
      POSTGRES_PASSWORD: penandpaper_dev
      POSTGRES_DB: penandpaper
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U penandpaper']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
